<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XRD 交互式分析工具</title>
<script src="https://cdn.plot.ly/plotly-3.0.1.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,'Microsoft YaHei',sans-serif;background:#f5f5f5;color:#333}
.header{background:#1a1a2e;color:#fff;padding:10px 24px;font-size:18px;font-weight:bold;letter-spacing:.5px}
.header span{font-weight:400;font-size:13px;opacity:.7;margin-left:12px}
.container{display:flex;height:calc(100vh - 44px)}
.panel{overflow-y:auto}
.panel-left{width:320px;min-width:280px;background:#fff;border-right:1px solid #ddd;padding:12px}
.panel-right{flex:1;display:flex;flex-direction:column}

.upload-zone{border:2px dashed #bbb;border-radius:8px;padding:18px;text-align:center;cursor:pointer;margin-bottom:12px;transition:all .2s}
.upload-zone:hover,.upload-zone.dragover{border-color:#457b9d;background:#f0f4f8}
.upload-zone p{font-size:13px;color:#666}
.upload-zone .sub{font-size:11px;color:#999;margin-top:4px}
.uploaded-file{font-size:12px;color:#457b9d;margin-bottom:8px;display:none}
.meta-box{background:#f8f9fa;border-radius:6px;padding:8px 10px;margin-bottom:12px;font-size:11px;line-height:1.6;display:none}

.section{margin-bottom:10px}
.section-title{font-size:12px;font-weight:700;color:#1a1a2e;border-bottom:1px solid #eee;padding-bottom:4px;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.section-title .dot{width:6px;height:6px;border-radius:50%;background:#457b9d}
.ctrl-row{display:flex;align-items:center;justify-content:space-between;font-size:12px;padding:3px 0}
.ctrl-row label{color:#555;flex-shrink:0}
.ctrl-row input[type=range]{width:120px;accent-color:#457b9d;margin:0 4px}
.ctrl-row input[type=checkbox]{accent-color:#457b9d;width:16px;height:16px}
.ctrl-row select{font-size:11px;padding:1px 4px;border:1px solid #ccc;border-radius:3px}
.ctrl-val{font-size:11px;color:#457b9d;min-width:28px;text-align:right;font-weight:700}

.phase-list{max-height:170px;overflow-y:auto}
.phase-item{display:flex;align-items:center;gap:6px;font-size:12px;padding:2px 0;cursor:pointer}
.phase-item input{accent-color:#457b9d}
.phase-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

.btn-row{display:flex;gap:6px;margin-top:8px}
.btn{padding:6px 14px;border:none;border-radius:4px;font-size:12px;cursor:pointer;transition:opacity .2s}
.btn:hover{opacity:.85}
.btn-primary{background:#457b9d;color:#fff}
.btn-outline{background:#fff;color:#457b9d;border:1px solid #457b9d}

.plot-container{flex:1;min-height:0}
#plot{width:100%;height:100%}
.table-area{border-top:1px solid #ddd;padding:8px 12px;max-height:180px;overflow-y:auto;display:none}
.table-area table{width:100%;border-collapse:collapse;font-size:11px}
.table-area th{background:#f0f4f8;padding:4px 6px;text-align:center;border-bottom:1px solid #ddd;position:sticky;top:0}
.table-area td{padding:3px 6px;text-align:center;border-bottom:1px solid #f0f0f0}
.match-ok{color:#2a9d8f;font-weight:700}
.match-no{color:#e76f51}

@media(max-width:700px){.container{flex-direction:column}.panel-left{width:100%;max-height:40vh}}
</style>
</head>
<body>
<div class="header">XRD 交互式分析工具<span>上传 XRD → 自动出图 → 实时调控</span></div>
<div class="container">
<div class="panel panel-left">
  <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
    <p>📁 点击上传或拖拽 XRD 数据文件</p>
    <p class="sub">Rigaku .asc / 两列文本 .txt</p>
  </div>
  <input type="file" id="fileInput" accept=".asc,.txt,.dat,.xy" style="display:none" onchange="handleFile(this.files[0])">
  <div class="uploaded-file" id="uploadedFile"></div>
  <div class="meta-box" id="metaBox"></div>

  <div class="section">
    <div class="section-title"><span class="dot"></span>曲线参数</div>
    <div class="ctrl-row"><label>背景扣除</label><input type="checkbox" id="bgSubtract" onchange="update()"></div>
    <div class="ctrl-row"><label>多项式阶数</label><input type="range" id="polyDeg" min="2" max="8" value="4" step="1" oninput="document.getElementById('polyDegVal').textContent=this.value;update()"><span class="ctrl-val" id="polyDegVal">4</span></div>
    <div class="ctrl-row"><label>寻峰阈值 (σ)</label><input type="range" id="sigmaThresh" min="1" max="5" value="2" step="0.1" oninput="document.getElementById('sigmaVal').textContent=this.value;update()"><span class="ctrl-val" id="sigmaVal">2.0</span></div>
    <div class="ctrl-row"><label>最小 SNR</label><input type="range" id="minSnr" min="1" max="5" value="2" step="0.1" oninput="document.getElementById('snrVal').textContent=this.value;update()"><span class="ctrl-val" id="snrVal">2.0</span></div>
    <div class="ctrl-row"><label>Y轴刻度</label><input type="checkbox" id="yTicks" onchange="update()"></div>
  </div>

  <div class="section">
    <div class="section-title"><span class="dot" style="background:#e63946"></span>卡片参数</div>
    <div class="ctrl-row"><label>卡片框高度</label><input type="range" id="cardHeight" min="20" max="120" value="54" step="2" oninput="document.getElementById('cardHVal').textContent=this.value;update()"><span class="ctrl-val" id="cardHVal">54</span></div>
    <div class="ctrl-row"><label>棒图缩放</label><input type="range" id="stickScale" min="0.1" max="1.5" value="0.5" step="0.05" oninput="document.getElementById('stickVal').textContent=this.value;update()"><span class="ctrl-val" id="stickVal">0.5</span></div>
    <div class="ctrl-row"><label>hkl 标注</label><input type="checkbox" id="showHkl" onchange="update()"></div>
    <div class="ctrl-row"><label>卡片背景</label><input type="checkbox" id="cardFill" onchange="update()"></div>
    <div class="ctrl-row"><label>分隔线</label><select id="dividerStyle" onchange="update()"><option value="solid">实线</option><option value="dot">点线</option><option value="dash">虚线</option><option value="none">无</option></select></div>
  </div>

  <div class="section">
    <div class="section-title"><span class="dot" style="background:#2a9d8f"></span>物相选择</div>
    <div class="phase-list" id="phaseList"></div>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" onclick="downloadPlot('png')">下载 PNG</button>
    <button class="btn btn-outline" onclick="downloadPlot('svg')">下载 SVG</button>
  </div>
</div>

<div class="panel panel-right">
  <div class="plot-container"><div id="plot"></div></div>
  <div class="table-area" id="tableArea">
    <div style="display:flex;gap:20px">
      <div style="flex:1"><b style="font-size:12px">寻峰结果</b> <span id="peakCount" style="font-size:11px;color:#888"></span>
        <table id="peakTable"><thead><tr><th>#</th><th>2θ(°)</th><th>d(Å)</th><th>FWHM(°)</th><th>SNR</th></tr></thead><tbody></tbody></table>
      </div>
      <div style="flex:1"><b style="font-size:12px">物相匹配</b><div id="phaseMatchInfo" style="font-size:11px;margin-top:4px"></div></div>
    </div>
  </div>
</div>
</div>

<script>
// ========== MATH UTILS ==========
function linspace(start, stop, num) {
  const arr = new Float64Array(num);
  const step = (stop - start) / (num - 1);
  for (let i = 0; i < num; i++) arr[i] = start + i * step;
  return arr;
}

function mean(arr) {
  let s = 0; for (let i = 0; i < arr.length; i++) s += arr[i];
  return s / arr.length;
}

function std(arr) {
  const m = mean(arr);
  let s = 0; for (let i = 0; i < arr.length; i++) s += (arr[i] - m) ** 2;
  return Math.sqrt(s / arr.length);
}

// Least-squares polynomial fit: y ≈ c[0] + c[1]*x + ... + c[deg]*x^deg
function polyfit(x, y, deg) {
  const n = x.length;
  const A = new Array(n);
  for (let i = 0; i < n; i++) {
    A[i] = new Float64Array(deg + 1);
    let xi = 1;
    for (let j = 0; j <= deg; j++) { A[i][j] = xi; xi *= x[i]; }
  }
  // Solve (A^T A) c = A^T y via normal equations
  const m = deg + 1;
  const AtA = new Array(m);
  const Aty = new Float64Array(m);
  for (let i = 0; i < m; i++) {
    AtA[i] = new Float64Array(m);
    let s = 0;
    for (let k = 0; k < n; k++) s += A[k][i] * y[k];
    Aty[i] = s;
    for (let j = 0; j < m; j++) {
      let s2 = 0;
      for (let k = 0; k < n; k++) s2 += A[k][i] * A[k][j];
      AtA[i][j] = s2;
    }
  }
  // Gaussian elimination with partial pivoting
  const aug = new Array(m);
  for (let i = 0; i < m; i++) {
    aug[i] = new Float64Array(m + 1);
    for (let j = 0; j < m; j++) aug[i][j] = AtA[i][j];
    aug[i][m] = Aty[i];
  }
  for (let col = 0; col < m; col++) {
    let maxRow = col;
    for (let row = col + 1; row < m; row++) if (Math.abs(aug[row][col]) > Math.abs(aug[maxRow][col])) maxRow = row;
    [aug[col], aug[maxRow]] = [aug[maxRow], aug[col]];
    for (let row = col + 1; row < m; row++) {
      const factor = aug[row][col] / aug[col][col];
      for (let j = col; j <= m; j++) aug[row][j] -= factor * aug[col][j];
    }
  }
  const c = new Float64Array(m);
  for (let i = m - 1; i >= 0; i--) {
    let s = aug[i][m];
    for (let j = i + 1; j < m; j++) s -= aug[i][j] * c[j];
    c[i] = s / aug[i][i];
  }
  return c;
}

function polyval(c, x) {
  const n = x.length;
  const y = new Float64Array(n);
  for (let i = 0; i < n; i++) {
    let xi = 1, s = 0;
    for (let j = 0; j < c.length; j++) { s += c[j] * xi; xi *= x[i]; }
    y[i] = s;
  }
  return y;
}

// ========== PHASE LIBRARY ==========
const PHASE_LIBRARY = {
  "Cu(OH)₂ PDF#13-0420": [[16.72,40],[23.84,60],[33.97,70],[35.90,50],[39.80,30],[53.29,40]],
  "CuO PDF#48-1548": [[32.51,15],[35.54,100],[38.71,96],[48.72,30],[53.49,15],[58.27,25],[61.53,25],[66.22,15]],
  "Cu₂O PDF#05-0667": [[29.55,10],[36.42,100],[42.30,40],[61.37,30]],
  "Cu PDF#04-0836": [[43.30,100],[50.43,46],[74.13,20]],
  "K₂SO₄ PDF#05-0613": [[21.36,25],[22.08,20],[29.77,90],[30.80,100],[31.05,70],[36.16,30],[43.08,20]],
  "KCl PDF#41-1476": [[28.35,100],[40.51,60],[50.22,25]],
  "Sn₂S₃ PDF#27-0899": [[12.635,90],[14.802,60],[21.136,25],[21.498,40],[23.771,30],[25.427,18],[29.756,12],[30.484,100],[30.807,15],[32.902,70],[33.536,20],[34.466,12],[35.891,10],[37.120,8],[38.100,17],[39.311,11]],
  "SnS PDF#39-0354": [[21.997,30],[22.298,10],[26.001,25],[27.460,20],[30.469,35],[31.523,100],[31.959,50],[32.863,8],[34.512,12],[39.046,16]],
};
const PHASE_COLORS = ['#457b9d','#e63946','#2a9d8f','#e76f51','#264653','#f4a261','#a8dadc','#6d597a'];

// ========== GLOBAL STATE ==========
let TT = null, RAW = null, FILENAME = '';

// ========== FILE PARSING ==========
function parseRigakuRaw(text) {
  const lines = text.split(/\r?\n/);
  const meta = {};
  let start = null, stop = null, step = null, count = null;
  let intensities = [];
  let dataSec = false;

  for (const line of lines) {
    const s = line.trim();
    if (!s) continue;
    if (s === '*BEGIN') continue;
    if (s.startsWith('*') && !dataSec) {
      const m = s.match(/^\*(.+?)\s*=\s*(.+)/);
      if (m) {
        const k = m[1].trim(), v = m[2].trim();
        meta[k] = v;
        if (k === 'START') start = parseFloat(v);
        else if (k === 'STOP') stop = parseFloat(v);
        else if (k === 'STEP') step = parseFloat(v);
        else if (k === 'COUNT') { count = parseInt(v); dataSec = true; }
      }
    } else if (dataSec) {
      for (const p of s.replace(/,/g, ' ').split(/\s+/)) {
        const v = parseFloat(p);
        if (!isNaN(v)) intensities.push(v);
      }
    }
  }
  const tt = linspace(start, stop, count);
  const raw = new Float64Array(intensities.slice(0, count));
  return { meta, tt, raw };
}

function parseTwoColumn(text) {
  const lines = text.split(/\r?\n/);
  const xy = [];
  for (const line of lines) {
    const s = line.trim();
    if (!s || s.startsWith('#') || s.startsWith('*')) continue;
    const parts = s.split(/\s+/);
    if (parts.length >= 2) {
      const x = parseFloat(parts[0]), y = parseFloat(parts[1]);
      if (!isNaN(x) && !isNaN(y)) xy.push([x, y]);
    }
  }
  const tt = new Float64Array(xy.map(p => p[0]));
  const raw = new Float64Array(xy.map(p => p[1]));
  return { meta: {}, tt, raw };
}

function autoParse(text) {
  if (text.includes('*TYPE')) return parseRigakuRaw(text);
  return parseTwoColumn(text);
}

// ========== ANALYSIS ==========
function subtractBackground(tt, raw, polyDeg = 4, nIter = 3, sigmaThresh = 2.5) {
  const n = raw.length;
  let mask = new Array(n).fill(true);
  let bg = null;

  for (let iter = 0; iter < nIter; iter++) {
    const xf = [], yf = [];
    for (let i = 0; i < n; i++) if (mask[i]) { xf.push(tt[i]); yf.push(raw[i]); }
    if (xf.length < polyDeg + 2) break;
    const c = polyfit(xf, yf, polyDeg);
    bg = polyval(c, tt);
    const residuals = new Float64Array(n);
    for (let i = 0; i < n; i++) residuals[i] = raw[i] - bg[i];
    const sigma = std(residuals.filter((_, i) => mask[i]));
    if (sigma === 0) break;
    const th = sigmaThresh * sigma;
    for (let i = 0; i < n; i++) mask[i] = residuals[i] < th;
  }
  // Final fit on mask
  const xf = [], yf = [];
  for (let i = 0; i < n; i++) if (mask[i]) { xf.push(tt[i]); yf.push(raw[i]); }
  const c = polyfit(xf, yf, polyDeg);
  bg = polyval(c, tt);
  const bgSub = new Float64Array(n);
  for (let i = 0; i < n; i++) bgSub[i] = raw[i] - bg[i];
  return { background: bg, bgSub };
}

function findPeaks(tt, signal, rawIntensity, sigmaThresh = 2, minSnr = 2) {
  const noise = std(signal);
  const threshold = sigmaThresh * noise;
  const peaks = [];
  const n = signal.length;
  let i = 1;
  while (i < n - 1) {
    if (signal[i] > threshold && signal[i] > signal[i-1] && signal[i] >= signal[i+1]) {
      const snr = noise > 0 ? signal[i] / noise : 0;
      if (snr >= minSnr) {
        const half = signal[i] / 2;
        let left = i;
        while (left > 0 && signal[left] > half) left--;
        let right = i;
        while (right < n - 1 && signal[right] > half) right++;
        const fwhm = tt[right] - tt[left];
        const d = 1.54059 / (2 * Math.sin(tt[i] / 2 * Math.PI / 180));
        peaks.push({ pos: +tt[i].toFixed(3), d: +d.toFixed(4), intensity: rawIntensity[i], snr: +snr.toFixed(1), fwhm: +fwhm.toFixed(3) });
      }
      i = right + 1;
    } else i++;
  }
  peaks.sort((a, b) => b.snr - a.snr);
  return peaks;
}

function matchPhase(obsPeaks, refPeaks, tolerance = 0.3) {
  let matched = 0, details = [];
  for (const [rp, ri] of refPeaks) {
    let best = null, bestDist = tolerance + 1;
    for (const p of obsPeaks) {
      const d = Math.abs(p.pos - rp);
      if (d < tolerance && d < bestDist) { bestDist = d; best = p; }
    }
    if (best) { matched++; details.push({ refPos: rp, refI: ri, obsPos: best.pos, delta: +bestDist.toFixed(3) }); }
  }
  return { matched, total: refPeaks.length, details, ratio: Math.round(matched / Math.max(refPeaks.length, 1) * 100) };
}

// ========== PLOT ==========
function buildPlot(tt, curveY, curveLabel, selPhases, peaks, cardH, stickS, showHkl, cardFill, divStyle, yTicks) {
  const traces = [];
  const shapes = [];
  const annotations = [];

  // Top: XRD curve
  traces.push({
    x: Array.from(tt), y: Array.from(curveY),
    type: 'scatter', mode: 'lines',
    line: { color: '#1a1a2e', width: 1 },
    name: curveLabel, showlegend: false,
    xaxis: 'x', yaxis: 'y',
  });

  // Bottom: card sticks
  const nPhases = selPhases.length;
  const sectionH = nPhases > 0 ? cardH / nPhases : cardH;

  selPhases.forEach(([pname, refPeaks], idx) => {
    const color = PHASE_COLORS[idx % PHASE_COLORS.length];
    const baseY = cardH - (idx + 1) * sectionH;
    const availH = sectionH;

    for (const [rp, ri] of refPeaks) {
      const h = (ri / 100) * availH * stickS;
      traces.push({
        x: [rp, rp], y: [baseY, baseY + h],
        type: 'scatter', mode: 'lines',
        line: { color, width: 1.5 },
        name: pname, showlegend: false, hoverinfo: 'skip',
        xaxis: 'x2', yaxis: 'y2',
      });
    }

    // Phase label
    annotations.push({
      x: tt[0], y: baseY + availH * 0.95,
      xref: 'x2', yref: 'y2',
      text: pname, showarrow: false,
      font: { size: 10, color },
      xanchor: 'left', yanchor: 'top',
    });

    // Divider
    if (idx < nPhases - 1 && divStyle !== 'none') {
      shapes.push({
        type: 'line', x0: tt[0], x1: tt[tt.length - 1], y0: baseY, y1: baseY,
        xref: 'x2', yref: 'y2',
        line: { color: '#bbbbbb', width: 0.8, dash: divStyle === 'solid' ? undefined : divStyle },
      });
    }
  });

  // Card frame
  if (cardFill) {
    shapes.push({
      type: 'rect', x0: tt[0], x1: tt[tt.length - 1], y0: 0, y1: cardH,
      xref: 'x2', yref: 'y2', fillcolor: '#f4f7fa',
      line: { color: '#333', width: 0.8 }, layer: 'below',
    });
  }

  const layout = {
    grid: { rows: 2, columns: 1, roworder: 'top to bottom', pattern: 'independent' },
    xaxis: { domain: [0, 1], anchor: 'y', range: [tt[0], tt[tt.length - 1]], showticklabels: false, showgrid: false, zeroline: false },
    yaxis: { domain: [0.62, 1], anchor: 'x', title: 'Intensity (a.u.)', titlefont: { size: 11 }, showticklabels: yTicks, tickfont: { size: 8 }, showgrid: false, zeroline: false },
    xaxis2: { domain: [0, 1], anchor: 'y2', title: '2θ (deg)', titlefont: { size: 11 }, range: [tt[0], tt[tt.length - 1]], tickfont: { size: 9 }, showgrid: false, zeroline: false },
    yaxis2: { domain: [0, 0.62], anchor: 'x2', range: [-2, cardH + 4], showticklabels: false, showgrid: false, zeroline: false },
    font: { family: 'Arial, sans-serif' },
    margin: { l: 50, r: 20, t: 20, b: 40 },
    plot_bgcolor: '#fff', paper_bgcolor: '#fff',
    height: 550, hovermode: 'x',
    shapes, annotations,
  };

  return { data: traces, layout };
}

// ========== UPDATE PIPELINE ==========
let updateTimer = null;
function update() {
  if (!TT || !RAW) return;
  clearTimeout(updateTimer);
  updateTimer = setTimeout(runAnalysis, 200);
}

function getParams() {
  return {
    bgSubtract: document.getElementById('bgSubtract').checked,
    polyDeg: +document.getElementById('polyDeg').value,
    sigmaThresh: +document.getElementById('sigmaThresh').value,
    minSnr: +document.getElementById('minSnr').value,
    cardHeight: +document.getElementById('cardHeight').value,
    stickScale: +document.getElementById('stickScale').value,
    showHkl: document.getElementById('showHkl').checked,
    cardFill: document.getElementById('cardFill').checked,
    dividerStyle: document.getElementById('dividerStyle').value,
    yTicks: document.getElementById('yTicks').checked,
    phases: Array.from(document.querySelectorAll('#phaseList input:checked')).map(cb => cb.value),
  };
}

function runAnalysis() {
  const p = getParams();
  let signal;
  if (p.bgSubtract) {
    const { bgSub } = subtractBackground(TT, RAW, p.polyDeg, 3, 2.5);
    signal = bgSub;
  } else {
    signal = RAW;
  }

  const peaks = findPeaks(TT, signal, RAW, p.sigmaThresh, p.minSnr);
  const selPhases = [];
  const phaseMatches = [];
  for (const pname of p.phases) {
    if (PHASE_LIBRARY[pname]) {
      const ref = PHASE_LIBRARY[pname];
      selPhases.push([pname, ref]);
      phaseMatches.push({ name: pname, ...matchPhase(peaks, ref) });
    }
  }

  // Normalize curve
  const maxVal = signal.reduce((a, b) => Math.max(a, b), 0);
  const curveY = maxVal > 0 ? new Float64Array(signal.length) : signal;
  if (maxVal > 0) for (let i = 0; i < signal.length; i++) curveY[i] = signal[i] / maxVal;

  const fig = buildPlot(TT, curveY, FILENAME.replace(/\.[^.]+$/, ''), selPhases, peaks,
    p.cardHeight, p.stickScale, p.showHkl, p.cardFill, p.dividerStyle, p.yTicks);

  Plotly.react('plot', fig.data, fig.layout, { responsive: true, displayModeBar: true,
    modeBarButtonsToRemove: ['lasso2d','select2d','autoScale2d'], displaylogo: false });

  // Table
  const area = document.getElementById('tableArea');
  area.style.display = 'block';
  document.getElementById('peakCount').textContent = `(${peaks.length} 个峰)`;
  const tbody = document.querySelector('#peakTable tbody');
  tbody.innerHTML = peaks.slice(0, 15).map((p, i) =>
    `<tr><td>${i + 1}</td><td>${p.pos}</td><td>${p.d}</td><td>${p.fwhm}</td><td>${p.snr}</td></tr>`).join('');
  document.getElementById('phaseMatchInfo').innerHTML = phaseMatches.map(m =>
    `<div style="margin-bottom:4px"><span class="${m.ratio >= 50 ? 'match-ok' : 'match-no'}">${m.ratio >= 50 ? '✓' : m.ratio >= 20 ? '△' : '✗'} ${m.name}: ${m.matched}/${m.total} (${m.ratio}%)</span></div>`).join('');
}

// ========== FILE HANDLING ==========
function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const { meta, tt, raw } = autoParse(e.target.result);
      TT = tt; RAW = raw; FILENAME = file.name;

      document.getElementById('uploadedFile').style.display = 'block';
      document.getElementById('uploadedFile').textContent = '✓ ' + file.name;

      const box = document.getElementById('metaBox');
      box.style.display = 'block';
      const fmt = file.name.endsWith('.asc') && text.includes('*TYPE') ? 'Rigaku RAW (.asc)' : '两列文本';
      box.innerHTML = `<b>格式:</b> ${fmt}<br><b>扫描:</b> ${tt[0].toFixed(1)}° – ${tt[tt.length-1].toFixed(1)}° · ${tt.length} 点<br><b>强度:</b> ${Math.min(...raw).toFixed(0)} – ${Math.max(...raw).toFixed(0)} counts`;

      update();
    } catch (err) {
      alert('解析失败: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function downloadPlot(fmt) {
  if (!TT) { alert('请先上传 XRD 数据'); return; }
  Plotly.downloadImage('plot', { format: fmt, width: 900, height: 600, scale: fmt === 'png' ? 2 : 1, filename: 'xrd_plot' });
}

// ========== INIT ==========
window.onload = function() {
  const list = document.getElementById('phaseList');
  const keys = Object.keys(PHASE_LIBRARY);
  list.innerHTML = keys.map((p, i) => {
    const color = PHASE_COLORS[i % PHASE_COLORS.length];
    return `<label class="phase-item"><input type="checkbox" value="${p}" onchange="update()" ${i < 2 ? 'checked' : ''}><span class="phase-dot" style="background:${color}"></span>${p}</label>`;
  }).join('');

  const zone = document.getElementById('uploadZone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('dragover'); if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]); });
};
</script>
